<!DOCTYPE html>
<html>
<head>
    <title>Štampa Kartica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print {
            @page { size: A4; margin: 10mm; }
            .no-print { display: none; }
            .card-container { page-break-inside: avoid; }
        }
        .bin-card {
            width: 90mm;
            height: 55mm;
            border: 2px solid #000;
            padding: 10px;
            margin: 5px;
            float: left;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .barcode-img { width: 100%; height: 20mm; object-fit: contain; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-4 no-print text-center">
        <button onclick="window.print()" class="btn btn-primary btn-lg px-5 shadow">
            <i class="bi bi-printer"></i> ODŠTAMPAJ KARTICE
        </button>
        <hr>
    </div>

    <div class="d-flex flex-wrap justify-content-center">
        {% for card in cards %}
        <div class="bin-card bg-white card-container">
            <div class="d-flex justify-content-between align-items-start">
                <div style="width: 70%;">
                    <small class="text-muted fw-bold" style="font-size: 0.7rem;">NAZIV ARTIKLA</small>
                    <div class="fw-bold" style="font-size: 1rem; line-height: 1.1;">{{ card.artikal.name }}</div>
                </div>
                <div class="text-end">
                    <small class="text-muted fw-bold d-block" style="font-size: 0.6rem;">MAPA</small>
                    <span class="badge bg-dark fs-6">{{ card.artikal.map_position|default:"---" }}</span>
                </div>
            </div>

            <div class="text-center my-1">
                <img src="data:image/png;base64,{{ card.barcode_img }}" class="barcode-img">
                <div class="fw-bold mt-1" style="letter-spacing: 2px;">{{ card.artikal.part_id_barcode }}</div>
            </div>

            <div class="d-flex justify-content-between border-top pt-1">
                <div>
                    <small class="text-muted d-block" style="font-size: 0.6rem;">POZICIJA MAŠINE</small>
                    <span class="small fw-bold">{{ card.artikal.position_on_machine|truncatechars:20 }}</span>
                </div>
                <div class="text-end">
                    <small class="text-muted d-block" style="font-size: 0.6rem;">MIN. KOL.</small>
                    <span class="fw-bold">{{ card.artikal.min_quantity }}</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
